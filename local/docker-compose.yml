version: "3.9"

services:
  app:
    image: nginx:latest
    container_name: sample-app
    ports:
      - "8080:80"
    depends_on:
      - postgres
      - redis
      - localstack

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    environment:
      SERVICES: s3,sqs,secretsmanager,ssm
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack

volumes:
  postgres-data:
  localstack-data: